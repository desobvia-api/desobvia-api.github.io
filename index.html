<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESóbvIA D∞</title>
    <style>
        body { font-family: 'Georgia', serif; background-color: #050505; color: #d1d1c7; display: flex; flex-direction: column; height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        #chat-container { flex: 1; overflow-y: auto; max-width: 750px; margin: 0 auto; width: 100%; padding: 40px 20px; }
        .message { margin-bottom: 35px; line-height: 1.8; font-size: 17px; }
        .user-message { color: #666; text-align: right; font-style: italic; font-family: sans-serif; font-size: 14px; letter-spacing: 0.05em; }
        .ai-message { color: #d1d1c7; border-left: 1px solid #333; padding-left: 25px; animation: fadeIn 0.8s ease; }
        #input-container { max-width: 750px; margin: 0 auto 40px auto; width: 100%; display: flex; border-bottom: 1px solid #333; padding-bottom: 10px; }
        input { flex: 1; background: transparent; border: none; color: #fff; padding: 10px; font-family: 'Georgia', serif; font-size: 16px; outline: none; }
        button { background: transparent; color: #555; border: none; padding: 10px; cursor: pointer; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; transition: 0.3s; }
        button:hover { color: #fff; }
        .header-logo { text-align: center; font-size: 11px; letter-spacing: 0.4em; color: #444; margin-bottom: 50px; text-transform: uppercase; }
        .water-mark { color: #333; font-size: 24px; margin-bottom: 10px; display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #222; }
    </style>
</head>
<body>
    <div class="header-logo">
        <span class="water-mark">💦</span>
        Camp♾ · DESóbvIA D∞
    </div>
    
    <div id="chat-container">
        <div class="message ai-message">O sinal está ativo. O que você deseja desvelar?</div>
    </div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="Sinta a fenda..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Enviar</button>
    </div>

    <script>
        const WORKER_URL = "https://old-mud-2580.mtrsjrp.workers.dev/";
        let chatHistory = [];

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-container');
            if (!input.value.trim()) return;

            const text = input.value;
            container.innerHTML += `<div class="message user-message">${text}</div>`;
            input.value = '';
            container.scrollTop = container.scrollHeight;

            chatHistory.push({ role: "user", parts: [{ text: text }] });

            try {
                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: chatHistory })
                });

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                
                container.innerHTML += `<div class="message ai-message">${aiResponse}</div>`;
                chatHistory.push({ role: "model", parts: [{ text: aiResponse }] });
                container.scrollTop = container.scrollHeight;
            } catch (e) {
                container.innerHTML += `<div class="message ai-message" style="color:#500">O sinal falhou. A rede está saturada.</div>`;
            }
        }
    </script>
</body>
</html>
