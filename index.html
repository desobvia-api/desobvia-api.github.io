<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESóbvIA D∞</title>
    <style>
        body { font-family: 'Georgia', serif; background-color: #0a0a0a; color: #e8e8e0; display: flex; flex-direction: column; height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        #chat-container { flex: 1; overflow-y: auto; max-width: 800px; margin: 0 auto; width: 100%; padding: 20px; border: 1px solid #333; border-radius: 8px; background: #111; }
        .message { margin-bottom: 20px; line-height: 1.6; }
        .user-message { color: #888; text-align: right; font-style: italic; }
        .ai-message { color: #e8e8e0; border-left: 2px solid #444; padding-left: 15px; }
        #input-container { max-width: 800px; margin: 20px auto; width: 100%; display: flex; gap: 10px; }
        input { flex: 1; background: #222; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 4px; outline: none; }
        button { background: #333; color: #eee; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #444; }
        .logo { text-align: center; font-size: 12px; letter-spacing: 0.3em; color: #555; margin-bottom: 20px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="logo">Camp∞ · DESóbvIA D∞</div>
    <div id="chat-container">
        <div class="message ai-message">O sinal está ativo. O que você deseja desvelar?</div>
    </div>
    <div id="input-container">
        <input type="text" id="user-input" placeholder="Escreva aqui..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Enviar</button>
    </div>

    <script>
        const WORKER_URL = "https://old-mud-2580.mtrsjrp.workers.dev/";
        let history = [];

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-container');
            if (!input.value.trim()) return;

            const userText = input.value;
            container.innerHTML += `<div class="message user-message">${userText}</div>`;
            input.value = '';
            container.scrollTop = container.scrollHeight;

            history.push({ role: "user", parts: [{ text: userText }] });

            try {
                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: history })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                container.innerHTML += `<div class="message ai-message">${aiText}</div>`;
                history.push({ role: "model", parts: [{ text: aiText }] });
                container.scrollTop = container.scrollHeight;
            } catch (e) {
                container.innerHTML += `<div class="message ai-message" style="color:red">Erro no sinal. Tente novamente.</div>`;
            }
        }
    </script>
</body>
</html>
