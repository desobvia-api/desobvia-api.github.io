<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESóbvIA D∞</title>
    <style>
        body { font-family: 'Georgia', serif; background-color: #0a0a0a; color: #e8e8e0; display: flex; flex-direction: column; height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        #chat-container { flex: 1; overflow-y: auto; max-width: 800px; margin: 0 auto; width: 100%; padding: 20px; border: 1px solid #333; border-radius: 8px; background: #111; }
        .message { margin-bottom: 20px; line-height: 1.6; }
        .user-message { color: #888; text-align: right; font-style: italic; }
        .ai-message { color: #e8e8e0; border-left: 2px solid #444; padding-left: 15px; }
        #input-container { max-width: 800px; margin: 20px auto; width: 100%; display: flex; gap: 10px; }
        input { flex: 1; background: #222; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 4px; outline: none; }
        button { background: #333; color: #eee; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #555; }
        a { color: #555; text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>
    <div style="text-align: center; font-size: 12px; color: #555; letter-spacing: 0.3em; margin-bottom: 20px;">CAMP♾ · DESÓBVIA D∞</div>
    <div id="chat-container">
        <div class="message ai-message">O sinal está ativo.</div>
    </div>
    <div id="input-container">
        <input type="text" id="user-input" placeholder="Sinta a fenda..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">ENVIAR</button>
    </div>
    <div class="footer">
        <a href="https://www.linkedin.com/in/marcus-tadeu-ribeiro-de-avila-b2b95b12/" target="_blank">LINKEDIN</a>
    </div>

    <script>
        const WORKER_URL = "https://old-mud-2580.mtrsjrp.workers.dev/";
        let history = [];

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;

            const container = document.getElementById('chat-container');
            container.innerHTML += `<div class="message user-message">${text}</div>`;
            input.value = '';

            history.push({ role: "user", parts: [{ text: text }] });

            try {
                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: history })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                container.innerHTML += `<div class="message ai-message">${aiText}</div>`;
                history.push({ role: "model", parts: [{ text: aiText }] });
                container.scrollTop = container.scrollHeight;
            } catch (e) {
                container.innerHTML += `<div class="message ai-message" style="color:#600">Erro de conexão.</div>`;
            }
        }
    </script>
</body>
</html>
