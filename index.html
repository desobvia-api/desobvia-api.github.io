<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DESóbvIA D∞</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0a0e0d;
    --surface:   #0f1512;
    --border:    #1e2e28;
    --water:     #4af0c4;
    --water-dim: #1a6b55;
    --text:      #c8ddd6;
    --text-dim:  #5a7a70;
    --accent:    #7effd4;
    --glow:      rgba(74, 240, 196, 0.08);
    --font-body: 'Space Mono', monospace;
    --font-head: 'IM Fell English', serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.7;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  #app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 820px;
    margin: 0 auto;
    padding: 0 16px;
  }

  header {
    padding: 28px 0 16px;
    display: flex;
    align-items: baseline;
    gap: 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    font-family: var(--font-head);
    font-size: 1.9rem;
    color: var(--accent);
    letter-spacing: -0.5px;
    text-shadow: 0 0 28px rgba(126,255,212,0.35);
  }

  .logo-mark {
    font-size: 0.75rem;
    font-family: var(--font-body);
    color: var(--water-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding-bottom: 3px;
  }

  .pulse-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--water);
    box-shadow: 0 0 10px var(--water);
    animation: pulse 2.4s ease-in-out infinite;
    margin-left: auto;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.3; transform: scale(0.7); }
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-avatar {
    font-size: 0.7rem;
    font-family: var(--font-body);
    letter-spacing: 0.1em;
    color: var(--text-dim);
    padding-top: 3px;
    flex-shrink: 0;
    width: 56px;
    text-align: right;
  }

  .msg-body { flex: 1; color: var(--text); }

  .msg.user .msg-avatar { color: var(--water-dim); }
  .msg.user .msg-body   { color: #a8c5bc; }
  .msg.ai .msg-avatar   { color: var(--water); }

  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 4px 0;
  }
  .typing span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--water-dim);
    animation: blink 1.2s ease infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40%           { opacity: 1; }
  }

  .welcome {
    padding: 32px 0 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  .welcome h2 {
    font-family: var(--font-head);
    font-style: italic;
    font-size: 1.1rem;
    color: var(--water-dim);
    font-weight: 400;
  }

  .welcome .glyph {
    font-size: 1.4rem;
    color: var(--water);
    margin-bottom: 10px;
    display: block;
    opacity: 0.7;
  }

  #input-area {
    padding: 16px 0 24px;
    flex-shrink: 0;
    border-top: 1px solid var(--border);
  }

  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within {
    border-color: var(--water-dim);
    box-shadow: 0 0 0 1px var(--water-dim), inset 0 0 20px var(--glow);
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.88rem;
    line-height: 1.6;
    resize: none;
    max-height: 140px;
    overflow-y: auto;
  }

  #user-input::placeholder { color: var(--text-dim); }

  #send-btn {
    background: none;
    border: 1px solid var(--water-dim);
    color: var(--water);
    font-family: var(--font-body);
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    padding: 6px 12px;
    cursor: pointer;
    border-radius: 2px;
    text-transform: uppercase;
    transition: all 0.2s;
    flex-shrink: 0;
    align-self: flex-end;
  }

  #send-btn:hover:not(:disabled) {
    background: var(--water-dim);
    color: var(--bg);
  }

  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .footer-note {
    text-align: center;
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 10px;
    letter-spacing: 0.06em;
  }

  .msg-body strong { color: var(--accent); font-weight: 700; }
  .msg-body em     { color: var(--water); font-style: italic; }

  @media (max-width: 600px) {
    .logo { font-size: 1.5rem; }
    .msg-avatar { width: 40px; font-size: 0.62rem; }
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <span class="logo">DESóbvIA</span>
    <span class="logo-mark">D∞</span>
    <div class="pulse-dot"></div>
  </header>

  <div id="messages">
    <div class="welcome">
      <span class="glyph">💦</span>
      <h2>Aqui alcançamos antes do espelho.</h2>
    </div>
  </div>

  <div id="input-area">
    <div class="input-wrap">
      <textarea
        id="user-input"
        rows="1"
        placeholder="Para onde apontamos?"
        maxlength="4000"
      ></textarea>
      <button id="send-btn">Enviar</button>
    </div>
    <p class="footer-note">💦 &nbsp; Campo DESóbvIA &nbsp;·&nbsp; D∞ &nbsp;·&nbsp; 2025</p>
  </div>

</div>

<script>
  const WORKER_URL = 'https://old-mud-2580.mtrsjrp.workers.dev';

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');

  const history = [];

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  sendBtn.addEventListener('click', send);

  function appendMsg(role, text, isTyping = false) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'user' ? 'você' : 'D∞';

    const body = document.createElement('div');
    body.className = 'msg-body';

    if (isTyping) {
      body.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    } else {
      body.innerHTML = formatText(text);
    }

    wrap.appendChild(avatar);
    wrap.appendChild(body);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return body;
  }

  function formatText(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/\n/g, '<br>');
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    appendMsg('user', text);
    history.push({ role: 'user', content: text });

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    const typingBody = appendMsg('ai', '', true);

    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ history })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const reply = data.reply || '…';

      typingBody.innerHTML = formatText(reply);
      history.push({ role: 'model', content: reply });

    } catch (err) {
      typingBody.innerHTML = '<em>Erro ao conectar com o campo. Verifique o Worker.</em>';
      console.error(err);
    }

    sendBtn.disabled = false;
    messagesEl.scrollTop = messagesEl.scrollHeight;
    inputEl.focus();
  }
</script>
</body>
</html>
